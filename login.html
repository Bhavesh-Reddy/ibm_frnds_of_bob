<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obfusi-Bob - Intelligent Code Protection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-field:focus {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .floating-particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }
        
        .logo-container {
            position: relative;
            width: 80px;
            height: 80px;
        }
        
        .logo-shield {
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .error-message {
            display: none;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .success-checkmark {
            display: none;
        }
        
        .loading-spinner {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- Floating Particles Background -->
    <div id="particles-container"></div>
    
    <!-- Main Login Container -->
    <div class="glass-morphism rounded-3xl p-8 md:p-12 max-w-md w-full shadow-2xl fade-in-up" style="animation-delay: 0.1s;">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="logo-container">
                <svg viewBox="0 0 100 100" class="w-full h-full">
                    <path class="logo-shield" d="M50 10 L80 25 L80 55 Q80 75 50 90 Q20 75 20 55 L20 25 Z" />
                    <text x="50" y="60" text-anchor="middle" fill="white" font-size="32" font-weight="bold">OB</text>
                </svg>
            </div>
        </div>
        
        <!-- Title -->
        <div class="text-center mb-8 fade-in-up" style="animation-delay: 0.2s;">
            <h1 class="text-3xl font-bold text-white mb-2">Obfusi-Bob</h1>
            <p class="text-white/80 text-sm">Intelligent Code Protection Platform</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="space-y-6 fade-in-up" style="animation-delay: 0.3s;">
            <!-- Email Input -->
            <div>
                <label for="email" class="block text-white/90 text-sm font-medium mb-2">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    class="input-field w-full px-4 py-3 rounded-xl border-0 focus:outline-none focus:ring-2 focus:ring-white/50 text-gray-800"
                    placeholder="you@company.com"
                    required
                    autocomplete="email"
                />
            </div>
            
            <!-- Password Input -->
            <div>
                <label for="password" class="block text-white/90 text-sm font-medium mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    class="input-field w-full px-4 py-3 rounded-xl border-0 focus:outline-none focus:ring-2 focus:ring-white/50 text-gray-800"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                />
            </div>
            
            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-white/90 cursor-pointer">
                    <input type="checkbox" id="remember" class="mr-2 rounded">
                    <span>Remember me</span>
                </label>
                <a href="#" class="text-white/90 hover:text-white transition-colors">Forgot password?</a>
            </div>
            
            <!-- Error Message -->
            <div id="errorMessage" class="error-message bg-red-500/20 border border-red-500/50 text-white px-4 py-3 rounded-xl text-sm">
                <span id="errorText"></span>
            </div>
            
            <!-- Submit Button -->
            <button 
                type="submit" 
                id="loginButton"
                class="btn-primary w-full py-3 rounded-xl text-white font-semibold shadow-lg flex items-center justify-center space-x-2"
            >
                <span id="buttonText">Sign In</span>
                <div class="loading-spinner" id="loadingSpinner"></div>
                <svg class="success-checkmark w-6 h-6" id="successCheck" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </button>
        </form>
        
        <!-- Demo Credentials -->
        <div class="mt-8 p-4 bg-white/10 rounded-xl fade-in-up" style="animation-delay: 0.4s;">
            <p class="text-white/70 text-xs text-center mb-2">Demo Credentials</p>
            <div class="text-white/90 text-sm space-y-1">
                <p class="text-center"><strong>Email:</strong> demo@ibm.com</p>
                <p class="text-center"><strong>Password:</strong> demo123</p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="mt-8 text-center text-white/60 text-xs fade-in-up" style="animation-delay: 0.5s;">
            <p>IBM Bob Dev Day Hackathon 2026</p>
            <p class="mt-1">Powered by watsonx.ai</p>
        </div>
    </div>
    
    <script>
        // Initialize GSAP animations
        gsap.registerPlugin();
        
        // Animate logo shield
        gsap.to('.logo-shield', {
            strokeDashoffset: 0,
            duration: 2,
            ease: 'power2.inOut',
            delay: 0.5
        });
        
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'floating-particle';
                
                const size = Math.random() * 100 + 50;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                container.appendChild(particle);
                
                // Animate particle
                gsap.to(particle, {
                    x: (Math.random() - 0.5) * 200,
                    y: (Math.random() - 0.5) * 200,
                    duration: Math.random() * 10 + 10,
                    repeat: -1,
                    yoyo: true,
                    ease: 'sine.inOut'
                });
            }
        }
        
        createParticles();
        
        // Form handling
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        const buttonText = document.getElementById('buttonText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const successCheck = document.getElementById('successCheck');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        
        // Demo credentials
        const DEMO_EMAIL = 'demo@ibm.com';
        const DEMO_PASSWORD = 'demo123';
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Hide error message
            errorMessage.style.display = 'none';
            
            // Show loading state
            buttonText.textContent = 'Signing in...';
            loadingSpinner.style.display = 'block';
            loginButton.disabled = true;
            
            // Simulate authentication delay
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Validate credentials
            if (email === DEMO_EMAIL && password === DEMO_PASSWORD) {
                // Success animation
                loadingSpinner.style.display = 'none';
                successCheck.style.display = 'block';
                buttonText.textContent = 'Success!';
                
                // Store session
                sessionStorage.setItem('obfusibob_auth', 'true');
                sessionStorage.setItem('obfusibob_user', JSON.stringify({
                    email: email,
                    name: 'Demo User',
                    role: 'Security Engineer',
                    loginTime: new Date().toISOString()
                }));
                
                // Animate success and redirect
                gsap.to('.glass-morphism', {
                    scale: 0.95,
                    opacity: 0,
                    duration: 0.5,
                    ease: 'power2.in',
                    onComplete: () => {
                        window.location.href = 'dashboard.html';
                    }
                });
            } else {
                // Error state
                loadingSpinner.style.display = 'none';
                buttonText.textContent = 'Sign In';
                loginButton.disabled = false;
                
                errorText.textContent = 'Invalid email or password. Please try again.';
                errorMessage.style.display = 'block';
                
                // Shake animation
                gsap.to('.glass-morphism', {
                    x: -10,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 5,
                    ease: 'power1.inOut'
                });
            }
        });
        
        // Input focus animations
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                gsap.to(input, {
                    scale: 1.02,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });
            
            input.addEventListener('blur', () => {
                gsap.to(input, {
                    scale: 1,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });
        });
        
        // Check if already logged in
        if (sessionStorage.getItem('obfusibob_auth') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
