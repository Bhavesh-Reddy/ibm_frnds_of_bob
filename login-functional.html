<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obfusi-Bob - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .input-field { background: rgba(255, 255, 255, 0.9); transition: all 0.3s; }
        .input-field:focus { background: white; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.6s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass rounded-3xl p-8 md:p-12 max-w-md w-full shadow-2xl fade-in">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center">
                <span class="text-4xl font-bold text-white">🛡️</span>
            </div>
        </div>
        
        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Obfusi-Bob</h1>
            <p class="text-white/80 text-sm">Intelligent Code Protection Platform</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-white/90 text-sm font-medium mb-2">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    class="input-field w-full px-4 py-3 rounded-xl border-0 focus:outline-none focus:ring-2 focus:ring-white/50 text-gray-800"
                    placeholder="demo"
                    required
                />
            </div>
            
            <div>
                <label class="block text-white/90 text-sm font-medium mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="input-field w-full px-4 py-3 rounded-xl border-0 focus:outline-none focus:ring-2 focus:ring-white/50 text-gray-800"
                    placeholder="••••••••"
                    required
                />
            </div>
            
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-white/90 cursor-pointer">
                    <input type="checkbox" id="remember" class="mr-2 rounded">
                    <span>Remember me</span>
                </label>
            </div>
            
            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-500/20 border border-red-500/50 text-white px-4 py-3 rounded-xl text-sm"></div>
            
            <!-- Submit Button -->
            <button 
                type="submit" 
                id="loginButton"
                class="btn-primary w-full py-3 rounded-xl text-white font-semibold shadow-lg flex items-center justify-center space-x-2"
            >
                <span id="buttonText">Sign In</span>
                <svg id="loadingSpinner" class="loading w-5 h-5 ml-2 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </form>
        
        <!-- Demo Credentials -->
        <div class="mt-8 p-4 bg-white/10 rounded-xl">
            <p class="text-white/70 text-xs text-center mb-2">Demo Credentials</p>
            <div class="text-white/90 text-sm space-y-1">
                <p class="text-center"><strong>Username:</strong> demo</p>
                <p class="text-center"><strong>Password:</strong> demo123</p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="mt-8 text-center text-white/60 text-xs">
            <p>IBM Bob Dev Day Hackathon 2026</p>
            <p class="mt-1">Powered by watsonx.ai</p>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:3000/api';
        
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');
        const loginButton = document.getElementById('loginButton');
        const buttonText = document.getElementById('buttonText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        
        // Check if already logged in
        if (sessionStorage.getItem('obfusibob_token')) {
            window.location.href = 'dashboard-functional.html';
        }
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const rememberMe = rememberCheckbox.checked;
            
            // Hide error
            errorMessage.classList.add('hidden');
            
            // Show loading
            buttonText.textContent = 'Signing in...';
            loadingSpinner.classList.remove('hidden');
            loginButton.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, rememberMe })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }
                
                // Store token and user data
                sessionStorage.setItem('obfusibob_token', data.token);
                sessionStorage.setItem('obfusibob_user', JSON.stringify(data.user));
                
                // Success
                buttonText.textContent = 'Success!';
                
                // Redirect
                setTimeout(() => {
                    window.location.href = 'dashboard-functional.html';
                }, 500);
                
            } catch (error) {
                // Show error
                errorMessage.textContent = error.message;
                errorMessage.classList.remove('hidden');
                
                // Reset button
                buttonText.textContent = 'Sign In';
                loadingSpinner.classList.add('hidden');
                loginButton.disabled = false;
                
                // Shake animation
                gsap.to('.glass', {
                    x: -10,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 5,
                    ease: 'power1.inOut'
                });
            }
        });
        
        // Input animations
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', () => {
                gsap.to(input, { scale: 1.02, duration: 0.3 });
            });
            input.addEventListener('blur', () => {
                gsap.to(input, { scale: 1, duration: 0.3 });
            });
        });
        
        // Animate on load
        gsap.from('.glass', {
            y: 50,
            opacity: 0,
            duration: 0.8,
            ease: 'power2.out'
        });
    </script>
</body>
</html>
