# Obfusi-Bob Docker Compose Configuration
# Production-ready orchestration with monitoring and persistence

version: '3.8'

services:
  # Main Application
  obfusi-bob:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obfusi-bob-app
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://obfusibob:secure_password@postgres:5432/obfusibob
    volumes:
      - ./test-samples:/app/test-samples:ro
      - ./logs:/app/logs
      - obfusibob-data:/app/data
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - obfusibob-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for Session Storage
  redis:
    image: redis:7-alpine
    container_name: obfusi-bob-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass redis_secure_password
    restart: unless-stopped
    networks:
      - obfusibob-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL for Data Persistence
  postgres:
    image: postgres:15-alpine
    container_name: obfusi-bob-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=obfusibob
      - POSTGRES_USER=obfusibob
      - POSTGRES_PASSWORD=secure_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - obfusibob-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obfusibob"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: obfusi-bob-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - obfusi-bob
    restart: unless-stopped
    networks:
      - obfusibob-network

  # Prometheus for Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: obfusi-bob-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - obfusibob-network

  # Grafana for Visualization (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: obfusi-bob-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - obfusibob-network

networks:
  obfusibob-network:
    driver: bridge

volumes:
  obfusibob-data:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

# Made with Bob
